<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Persona Favorita ❤️</title>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #fff5f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 1.5s ease-in-out;
        }

        body.celebracion {
            background-image: url('Snapchat-1771218290.jpg');
        }

        /* --- CONTENEDOR DE PREGUNTA --- */
        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.3);
            text-align: center;
            z-index: 10;
            width: 320px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container.oculto {
            opacity: 0;
            transform: translateY(-100px) scale(0.8);
            pointer-events: none;
        }

        /* --- MENSAJE FINAL (OCULTO AL INICIO) --- */
        #mensaje-final {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
            opacity: 0;
            z-index: 20;
            transition: opacity 2s ease-in-out;
            pointer-events: none;
        }

        #mensaje-final.visible {
            opacity: 1;
        }

        h1 { color: #ff4d6d; margin-bottom: 1.5rem; font-size: 1.6rem; }
        h2 { font-size: 2.5rem; margin-bottom: 10px; }
        p.dedicatoria { font-size: 1.4rem; font-style: italic; }

        label { display: block; margin-top: 1rem; color: #555; font-weight: bold; text-align: left; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 10px;
            border: 2px solid #ddd;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input[readonly] {
            background-color: #fff0f3;
            color: #ff4d6d;
            border-color: #ff4d6d;
        }

        button {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background-color: #ff758f; transform: scale(1.02); }

        #error-msj { margin-top: 15px; color: #ff4d6d; font-weight: bold; min-height: 20px; }

        /* --- LLUVIA DE FLORES --- */
        .flower {
            position: fixed;
            top: -50px;
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
            z-index: 15;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <div id="mensaje-final">
        <h2>¡Eres lo mejor que me ha pasado! ❤️</h2>
        <p class="dedicatoria">Gracias por cada momento a mi lado...</p>
    </div>

    <div class="container" id="box">
        <h1>Nuestra Historia 💖</h1>
        
        <label>Desde el:</label>
        <input type="text" value="22 de Diciembre, 2019" readonly>
        
        <label>¿Cuántos meses han pasado?</label>
        <input type="number" id="inputMeses" placeholder="Escribe el número...">
        
        <button onclick="comprobar()">Comprobar ❤️</button>
        <div id="error-msj"></div>
    </div>

    <div id="lluvia"></div>

    <script>
        function comprobar() {
            const input = document.getElementById('inputMeses').value;
            const msj = document.getElementById('error-msj');
            const box = document.getElementById('box');
            const mensajeFinal = document.getElementById('mensaje-final');
            
            // Cálculo automático de meses
            const inicio = new Date(2019, 11, 22); 
            const hoy = new Date();
            let mesesReal = (hoy.getFullYear() - inicio.getFullYear()) * 12;
            mesesReal += hoy.getMonth() - inicio.getMonth();
            if (hoy.getDate() < inicio.getDate()) mesesReal--;

            if (parseInt(input) === mesesReal) {
                // EFECTO DE ÉXITO
                box.classList.add('oculto'); 
                document.body.classList.add('celebracion'); 
                
                // Mostrar el mensaje romántico después de un pequeño delay
                setTimeout(() => {
                    mensajeFinal.classList.add('visible');
                }, 1000);

                lanzarFlores(); 
            } else {
                msj.innerText = "¡Ese no es! Piensa un poquito más... 💕";
                // Limpiar mensaje de error después de 3 segundos
                setTimeout(() => { msj.innerText = ""; }, 3000);
            }
        }

        function lanzarFlores() {
            const contenedor = document.getElementById('lluvia');
            const flores = ['🌷', '🌸', '🌹', '🌺', '✨', '❤️'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.className = 'flower';
                    f.innerText = flores[Math.floor(Math.random() * flores.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    const duracion = Math.random() * 3 + 3;
                    f.style.animationDuration = duracion + 's';
                    f.style.opacity = Math.random();
                    contenedor.appendChild(f);
                    
                    setTimeout(() => f.remove(), duracion * 1000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
